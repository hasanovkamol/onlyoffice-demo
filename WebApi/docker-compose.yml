services:
  webapi:
    image: ${DOCKER_REGISTRY-}webapi
    build:
      context: .
      dockerfile: WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db-postgres;Database=hrm_db;Username=postgres;Password=my_password
    ports:
      - "5000:8080"
    depends_on:
      - db-postgresql
    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  ONLYOFFICE Docs — Community Edition (Rasmiy image)
  #  image: onlyoffice/documentserver:latest
  #  ⚠️  20 ta bir vaqtda ulanish limiti bor (rasmiy build)
  # ═══════════════════════════════════════════════════════
  onlyoffice_ds:
    container_name: onlyoffice_ds
    build:
      context: ./build_tools
      dockerfile: Dockerfile.production
    restart: always
    stdin_open: true
    stop_grace_period: 60s
    depends_on:
      db-postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    ports:
      - "8080:80"       # HTTP
      - "443:443"     # HTTPS (SSL sertifikat bo'lsa)

    environment:
      # ── Ma'lumotlar bazasi ──────────────────────────
      - DB_TYPE=postgres
      - DB_HOST=db-postgresql
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - DB_PWD=KUCHLI_PAROL_YOZING         # <── o'zgartiring!

      # ── RabbitMQ (xabar navbati) ────────────────────
      - AMQP_TYPE=rabbitmq
      - AMQP_URI=amqp://guest:guest@rabbitmq

      # ── JWT xavfsizlik (tavsiya etiladi) ───────────
      - JWT_ENABLED=true
      - JWT_SECRET=a4feb64bd8664a479ba7cdb689b86fc7d8cca18ee474afb454aaf6ef9d19755e

      - JWT_HEADER=Authorization
      - JWT_IN_BODY=false

      # ── Nginx sozlamalari ───────────────────────────
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024
      - METRICS_ENABLED=true
      - METRICS_STATSD_HOST=statsd_exporter
      - METRICS_STATSD_PORT=9125


      # ── SSL (sertifikat bo'lsa, quyidagi satrlarni yoching) ─
      # - SSL_CERTIFICATE_PATH=/var/www/onlyoffice/Data/certs/tls.crt
      # - SSL_KEY_PATH=/var/www/onlyoffice/Data/certs/tls.key
      # - SSL_DHPARAM_PATH=/var/www/onlyoffice/Data/certs/dhparam.pem

    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
      - onlyoffice_fonts:/usr/share/fonts

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  PostgreSQL — Ma'lumotlar bazasi
  # ═══════════════════════════════════════════════════════
  db-postgresql:
    container_name: db-postgresql
    image: postgres:15
    restart: always
    expose:
      - "5432"

    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_PASSWORD=KUCHLI_PAROL_YOZING   # <── yuqori bilan bir xil!

    volumes:
      - postgresql_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyoffice -d onlyoffice"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  RabbitMQ — Xabar navbati (message broker)
  # ═══════════════════════════════════════════════════════
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    restart: always
    expose:
      - "5672"
    ports:
      - "15672:15672"   # Boshqaruv paneli: http://localhost:15672

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  Seq — Centralized logging
  # ═══════════════════════════════════════════════════════
  seq:
    container_name: seq
    image: datalust/seq
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin_password_123 # Standart admin paroli

    ports:
      - "5341:80"        # UI: http://localhost:5341
    volumes:
      - seq_data:/data
    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  Prometheus — Metrics Collection
  # ═══════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./Monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  PostgreSQL Exporter — Database Metrics
  # ═══════════════════════════════════════════════════════
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://onlyoffice:KUCHLI_PAROL_YOZING@db-postgresql:5432/onlyoffice?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - onlyoffice-net

  # ═══════════════════════════════════════════════════════
  #  Grafana — Visualization Dashboard
  # ═══════════════════════════════════════════════════════

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_password_123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./Monitoring/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
    networks:
      - onlyoffice-net


  # ═══════════════════════════════════════════════════════
  #  StatsD Exporter — Converts OnlyOffice metrics to Prometheus
  # ═══════════════════════════════════════════════════════
  statsd_exporter:
    image: prom/statsd-exporter:latest
    container_name: statsd_exporter
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    networks:
      - onlyoffice-net

# ═══════════════════════════════════════════════════════
#  Named Volumes

# ═══════════════════════════════════════════════════════

volumes:
  seq_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  onlyoffice_cache:
  onlyoffice_fonts:
  postgresql_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

# ═══════════════════════════════════════════════════════
#  Network
# ═══════════════════════════════════════════════════════
networks:
  onlyoffice-net:
    driver: bridge

