apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      service: monitoring
  template:
    metadata:
      labels:
        service: monitoring
    spec:
      containers:
      # Seq - Logging
      - name: seq
        image: datalust/seq
        env:
        - name: ACCEPT_EULA
          value: "Y"
        ports:
        - containerPort: 80
      
      # Prometheus - Metrics
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
      
      # Grafana - Dashboards
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-svc
spec:
  selector:
    service: monitoring
  ports:
  - name: seq
    port: 5341
    targetPort: 80
  - name: prometheus
    port: 9090
    targetPort: 9090
  - name: grafana
    port: 3000
    targetPort: 3000
